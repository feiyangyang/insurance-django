services:
  web:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SECRET_KEY: "${SECRET_KEY}"
      DEBUG: "${DEBUG:-False}"
      ALLOWED_HOSTS: "${ALLOWED_HOSTS:-localhost,127.0.0.1}"
      CSRF_TRUSTED_ORIGINS: "${CSRF_TRUSTED_ORIGINS:-}"
      DATABASE_URL: "${DATABASE_URL:-sqlite:////data/db.sqlite3}"
      SECURE_SSL_REDIRECT: "${SECURE_SSL_REDIRECT:-False}"
      SESSION_COOKIE_SECURE: "${SESSION_COOKIE_SECURE:-False}"
      CSRF_COOKIE_SECURE: "${CSRF_COOKIE_SECURE:-False}"
      SECURE_HSTS_SECONDS: "${SECURE_HSTS_SECONDS:-0}"
      SECURE_HSTS_INCLUDE_SUBDOMAINS: "${SECURE_HSTS_INCLUDE_SUBDOMAINS:-False}"
      SECURE_HSTS_PRELOAD: "${SECURE_HSTS_PRELOAD:-False}"
      GUNICORN_WORKERS: "${GUNICORN_WORKERS:-3}"
      GUNICORN_TIMEOUT: "${GUNICORN_TIMEOUT:-60}"
    ports:
      - "${WEB_PORT:-80}:8000"
    volumes:
      - app_data:/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  app_data:
