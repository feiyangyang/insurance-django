{% extends "base.html" %}

{% block content %}
<div class="page-header d-print-none mb-3">
    <div class="row align-items-center">
        <div class="col">
            <div class="page-pretitle">Customer</div>
            <h2 class="page-title">客户信息管理</h2>
        </div>
        <div class="col-auto ms-auto">
            <a href="{% url 'customer_add' %}" class="btn btn-primary btn-sm">
                <i class="ti ti-plus me-1"></i>
                新增客户
            </a>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h3 class="card-title">客户列表</h3>
        <div class="card-actions">
            <form method="get" class="d-flex gap-2">
                <input type="text" name="keyword" value="{{ keyword }}" class="form-control form-control-sm"
                       placeholder="请输入客户姓名搜索">
                <button class="btn btn-outline-primary btn-sm" type="submit">
                    <i class="ti ti-search me-1"></i>
                    查询
                </button>
            </form>
        </div>
    </div>
    <div class="table-responsive">
        <table class="table table-vcenter table-sm card-table">
            <thead>
            <tr>
                <th>客户姓名</th>
                <th>性别</th>
                <th>年龄</th>
                <th>手机号</th>
                <th>身份证号</th>
                <th class="w-1">操作</th>
            </tr>
            </thead>
            <tbody>
            {% for customer in customers %}
            <tr>
                <td class="fw-medium">{{ customer.name }}</td>
                <td>{{ customer.gender }}</td>
                <td>{{ customer.age }}</td>
                <td>{{ customer.phone }}</td>
                <td class="font-monospace text-muted">{{ customer.id_number }}</td>
                <td>
                    <div class="btn-list flex-nowrap">
                        <a href="{% url 'customer_edit' customer.id %}" class="btn btn-sm btn-outline-primary">
                            <i class="ti ti-edit me-1"></i>
                            编辑
                        </a>
                        <a href="{% url 'customer_delete' customer.id %}"
                           class="btn btn-sm btn-outline-danger"
                           onclick="return confirm('确认删除该客户吗？')">
                            <i class="ti ti-trash me-1"></i>
                            删除
                        </a>
                    </div>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="6" class="text-center text-muted py-4">暂无客户数据</td>
            </tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
