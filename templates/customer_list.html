{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3>客户信息管理</h3>
    <a href="{% url 'customer_add' %}" class="btn btn-primary">新增客户</a>
</div>

<form method="get" class="row g-2 mb-3">
    <div class="col-md-4">
        <input type="text" name="keyword" value="{{ keyword }}" class="form-control" placeholder="请输入客户姓名搜索">
    </div>
    <div class="col-md-2">
        <button class="btn btn-outline-primary" type="submit">查询</button>
    </div>
</form>

<div class="table-card">
    <table class="table table-hover align-middle">
        <thead>
        <tr>
            <th>客户姓名</th>
            <th>性别</th>
            <th>年龄</th>
            <th>手机号</th>
            <th>身份证号</th>
            <th style="width:180px;">操作</th>
        </tr>
        </thead>
        <tbody>
        {% for customer in customers %}
        <tr>
            <td>{{ customer.name }}</td>
            <td>{{ customer.gender }}</td>
            <td>{{ customer.age }}</td>
            <td>{{ customer.phone }}</td>
            <td>{{ customer.id_number }}</td>
            <td>
                <a href="{% url 'customer_edit' customer.id %}" class="btn btn-sm btn-outline-primary">编辑</a>
                <a href="{% url 'customer_delete' customer.id %}"
                   class="btn btn-sm btn-outline-danger"
                   onclick="return confirm('确认删除该客户吗？')">删除</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="6" class="text-center text-muted">暂无客户数据</td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
