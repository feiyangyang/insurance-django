<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>保险人工核保系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#f4f6f9; }
        .sidebar {
            width:240px; min-height:100vh; background:#1f2d3d; color:white; position:fixed;
        }
        .sidebar a {
            color:#cfd8e3; display:block; padding:14px 24px; text-decoration:none;
        }
        .sidebar a:hover { background:#2f4054; color:white; }
        .main { margin-left:240px; padding:24px; }
        .card { border:none; border-radius:12px; box-shadow:0 4px 14px rgba(0,0,0,.06); }
        .table-card { background:white; border-radius:12px; padding:20px; }
    </style>
</head>
<body>
<div class="sidebar">
    <h4 class="p-4 mb-0">保险核保系统</h4>
    <a href="/">工作台</a>
    <a href="/customer/">客户管理</a>
    <a href="{% url 'policy_list' %}">保单管理</a>
    <a href="/admin/underwriting/underwritingtask/">核保任务</a>
    <a href="/admin/underwriting/auditlog/">审核记录</a>
    <a href="{% url 'system_db_check' %}">系统检测</a>
    <a href="/admin/">系统后台</a>
</div>

<div class="main">
    {% block content %}{% endblock %}
</div>
</body>
</html>
