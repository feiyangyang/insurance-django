<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>保险人工核保系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/css/tabler.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.35.0/dist/tabler-icons.min.css">
    <style>
        :root {
            --tblr-body-font-size: .8125rem;
        }

        body {
            background: #f6f8fb;
            font-size: .8125rem;
        }

        .navbar-vertical.navbar-expand-lg {
            background: #182433;
            border-right: 1px solid #243447;
            width: 15rem;
        }

        .navbar-vertical .navbar-brand a {
            color: #ffffff;
        }

        .navbar-vertical .nav-link {
            color: #d8e2ef;
        }

        .navbar-vertical .nav-link-icon {
            color: #9fb3c8;
        }

        .navbar-vertical .nav-item.active .nav-link,
        .navbar-vertical .nav-link:hover {
            background: rgba(255, 255, 255, .08);
            color: #ffffff;
        }

        .navbar-vertical .nav-item.active .nav-link-icon,
        .navbar-vertical .nav-link:hover .nav-link-icon {
            color: #ffffff;
        }

        .page-wrapper {
            margin-left: 15rem;
        }

        .navbar-brand {
            font-size: .95rem;
            letter-spacing: 0;
        }

        .nav-link {
            min-height: 2.35rem;
            font-size: .8125rem;
        }

        .page-body {
            margin-top: 1rem;
        }

        .page-title {
            font-size: 1.05rem;
        }

        .card {
            border-radius: 6px;
            box-shadow: 0 1px 2px rgba(24, 36, 51, .04);
        }

        .card-header {
            min-height: 2.8rem;
        }

        .card-title {
            font-size: .9rem;
        }

        .table {
            font-size: .8125rem;
        }

        .table th {
            color: #667085;
            font-size: .75rem;
            font-weight: 600;
            text-transform: none;
        }

        .btn {
            font-size: .8125rem;
        }

        .form-control,
        .form-select {
            font-size: .8125rem;
            min-height: 2rem;
        }

        form label {
            color: #475467;
            display: block;
            font-size: .75rem;
            font-weight: 600;
            margin-bottom: .35rem;
        }

        .stat-value {
            font-size: 1.35rem;
            font-weight: 700;
            line-height: 1.2;
        }

        @media (max-width: 991.98px) {
            .navbar-vertical.navbar-expand-lg {
                width: 100%;
            }

            .page-wrapper {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
<div class="page">
    <aside class="navbar navbar-vertical navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <h1 class="navbar-brand navbar-brand-autodark">
                <a href="/" class="text-decoration-none">
                    <span class="nav-link-icon d-inline-block me-2"><i class="ti ti-shield-check"></i></span>
                    保险核保系统
                </a>
            </h1>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#sidebar-menu"
                    aria-controls="sidebar-menu" aria-expanded="false" aria-label="展开导航">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="sidebar-menu">
                <ul class="navbar-nav pt-lg-3">
                    <li class="nav-item {% if request.path == '/' %}active{% endif %}">
                        <a class="nav-link" href="/">
                            <span class="nav-link-icon"><i class="ti ti-layout-dashboard"></i></span>
                            <span class="nav-link-title">工作台</span>
                        </a>
                    </li>
                    <li class="nav-item {% if request.path|slice:':10' == '/customer/' %}active{% endif %}">
                        <a class="nav-link" href="{% url 'customer_list' %}">
                            <span class="nav-link-icon"><i class="ti ti-users"></i></span>
                            <span class="nav-link-title">客户管理</span>
                        </a>
                    </li>
                    <li class="nav-item {% if request.path|slice:':8' == '/policy/' %}active{% endif %}">
                        <a class="nav-link" href="{% url 'policy_list' %}">
                            <span class="nav-link-icon"><i class="ti ti-file-invoice"></i></span>
                            <span class="nav-link-title">保单管理</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/underwriting/underwritingtask/">
                            <span class="nav-link-icon"><i class="ti ti-checklist"></i></span>
                            <span class="nav-link-title">核保任务</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/underwriting/auditlog/">
                            <span class="nav-link-icon"><i class="ti ti-clipboard-text"></i></span>
                            <span class="nav-link-title">审核记录</span>
                        </a>
                    </li>
                    <li class="nav-item {% if request.path == '/system/db-check/' %}active{% endif %}">
                        <a class="nav-link" href="{% url 'system_db_check' %}">
                            <span class="nav-link-icon"><i class="ti ti-database-search"></i></span>
                            <span class="nav-link-title">系统检测</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/">
                            <span class="nav-link-icon"><i class="ti ti-settings"></i></span>
                            <span class="nav-link-title">系统后台</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </aside>

    <div class="page-wrapper">
        <header class="navbar navbar-expand-md d-print-none">
            <div class="container-xl">
                <div class="navbar-nav flex-row order-md-last ms-auto">
                    <div class="nav-item">
                        <span class="badge bg-blue-lt">Django SSR</span>
                    </div>
                </div>
                <div>
                    <div class="text-muted small">Enterprise underwriting console</div>
                    <div class="fw-semibold">保险人工核保系统</div>
                </div>
            </div>
        </header>

        <main class="page-body">
            <div class="container-xl">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/js/tabler.min.js" defer></script>
</body>
</html>
